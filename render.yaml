services:
  - type: web
    name: ai-insiders-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_improved.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        value: https://ai-insiders-bot.onrender.com
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
    autoDeploy: true
